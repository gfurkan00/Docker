services:
  web:
    environment:
      STAGE: dev
    volumes:
      - ./:/app                               # live source
    ports:
      - "5678:5678"                           # debugpy
    command: >
      python -m debugpy --listen 0.0.0.0:5678
      -m flask --app app run --host 0.0.0.0 --port 8080 --no-reload
